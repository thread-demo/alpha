function rEpr(){
  return `
  <div class="eprv" id="eprv">
    <button class="btn ghost" onclick="go('ward')" style="margin-bottom:12px;">${ico('arrow_back')}Back to Thread</button>
    <h1 class="pagetitle">How Thread meets the EPR</h1>
    <p class="lede">Thread does not replace the record. It renders <b>inside</b> the hospital EPR as a companion panel, while its data lives in Thread's own store with its own retention rules. Nothing crosses into the permanent record until a nurse escalates it. This is a working concept: open the Thread panel, act on a read, and watch an escalation file back into the EPR notes.</p>
    <div class="frame">
      <div class="etop">
        <span class="sys">${ico('local_hospital')}MedChart EPR</span>
        <span class="env">PROD · WARD 7B</span>
        <span class="right">T. Rowe, RN</span>
      </div>
      <div class="ebanner">
        <span class="pn">HALE, Margaret</span>
        <span class="dm">92 F · NHS 943 476 5919 · Bed 6</span>
        <span class="echip al">${ico('warning')} Penicillin</span>
        <span class="echip">DNACPR in place</span>
        <button class="tchip" onclick="eprToggleDrawer()" aria-label="Open Thread panel">
          <span class="k" aria-hidden="true"></span>Thread<span class="c" id="eprcount">${EPR.threads.filter(t=>t.status==='live').length}</span>
        </button>
      </div>
      <div class="etabs"><span class="on">Overview</span><span>Observations</span><span>Medications</span><span>Notes</span><span>Orders</span><span>Results</span></div>
      <div class="stage">
        <div class="eprcol">
          <div class="egrid">
            <div class="ep w6" id="eprNews">
              <div class="eh">${ico('monitoring')}NEWS2 · latest</div>
              <div class="eb">
                <div class="news"><span class="n">1</span>
                  <svg width="140" height="30" viewBox="0 0 140 30" aria-label="NEWS trend"><polyline points="4,18 18,18 32,11 46,18 60,18 74,11 88,18 102,18 116,18 134,18" fill="none" stroke="#2F5FA5" stroke-width="2"/><circle cx="134" cy="18" r="3" fill="#2F5FA5"/></svg>
                </div>
                <div style="font-size:10px;color:var(--emut);font-weight:600;margin-top:5px;">LAST SET 18:20 · P. Kaur RN · RR 17 · SpO2 96% · HR 88 · 36.8</div>
              </div>
            </div>
            <div class="ep w6">
              <div class="eh">${ico('clinical_notes')}Clinical overview</div>
              <div class="eb">
                <div class="ekv"><span>Diagnosis</span><b>Frailty · delirium screen +ve</b></div>
                <div class="ekv"><span>4AT</span><b>Positive (08:15)</b></div>
                <div class="ekv"><span>Consultant</span><b>Dr A. Rahman</b></div>
              </div>
            </div>
            <div class="ep w12" id="eprNotes">
              <div class="eh">${ico('description')}Notes · latest</div>
              <div class="eb" id="eprNotesList">
                <div class="enote"><div class="nh">14:20 · Family meeting · Dr A. Rahman</div><div class="nb">Discussed delirium pathway with daughter. Questions re prognosis; leaflet given.</div></div>
                <div class="enote"><div class="nh">08:30 · Ward round · Dr A. Rahman</div><div class="nb">Stable overnight. Continue delirium bundle, chase screen bloods.</div></div>
              </div>
            </div>
          </div>
          <div class="mobcue" style="padding:0 14px 14px;">
            <button class="ebtn big" onclick="eprToggleDrawer()">${ico('dataset_linked')}Open the Thread panel</button>
          </div>
        </div>
        <aside class="edrawer" id="edrawer" aria-label="Thread companion panel">
          <div class="dh">
            <span class="logo" aria-label="Thread">${EPR_LOGO}</span>
            <span class="hg">
              <button class="nb" id="eprNewBtn" onclick="EPR.composing=true;eprRender()" aria-label="New Thread">${ico('add')}New</button>
              <button class="cl" onclick="eprToggleDrawer()" aria-label="Collapse panel">${ico('close')}</button>
            </span>
          </div>
          <div class="dsub"><b>Margaret Hale · Bed 6</b> · rendered in the EPR, stored apart · signed in as Tom R, RN</div>
          <div class="dbody" id="eprBody"></div>
          <div class="dfoot">Nothing here enters the record unless a nurse escalates it. Unresolved Threads expire at 07:30 handover. Content access is logged.</div>
        </aside>
      </div>
    </div>
    <div class="flowrow">
      <div class="flowstep"><div class="sn">1</div><h4>Rendered in context</h4><p>Thread launches as a panel inside the EPR in patient context, using standard app-embedding (SMART on FHIR).</p></div>
      <div class="flowstep"><div class="sn">2</div><h4>Stored apart</h4><p>Reads live in Thread's store with a shift-clock lifecycle, not in the medical record. Different governance, different retention.</p></div>
      <div class="flowstep"><div class="sn">3</div><h4>Escalation is the bridge</h4><p>Only escalation writes back: one governed note with dual attribution. Everything else expires at handover.</p></div>
    </div>
  </div>`;
}
function eprRender(){
  const drawer=el('edrawer'); if(!drawer) return;
  const live=EPR.threads.filter(t=>t.status==='live');
  const cnt=el('eprcount'); if(cnt) cnt.textContent=live.length;
  el('eprBody').innerHTML=(EPR.composing?eprCompose():'')+live.map(eprCard).join('')+eprGhosts();
  const nb=el('eprNewBtn'); if(nb) nb.style.display=EPR.composing?'none':'inline-flex';
  if(EPR.composing) eprWire();
}
function eprToggleDrawer(){
  const v=el('eprv'); if(v) v.classList.toggle('showdrawer');
  eprRender();
  const bd=el('eprBody'); if(bd) bd.scrollTop=0;
}
function eprCard(t){
  const menu=EPR.menuFor===t.id?eprMenu(t):'';
  const meta=esc(t.author)+' · '+t.time+(t.ack?' · acknowledged '+t.ack.at:' · live')+' · expires 07:30';
  return `
  <div class="ecard ${t.cat}">
    <button class="kbb" aria-haspopup="menu" aria-expanded="${EPR.menuFor===t.id}" aria-label="Actions" onclick="event.stopPropagation();eprMenuFor('${t.id}')">${ico('more_horiz')}</button>
    <div class="th">${ico(CATS[t.cat].ico)}${CATS[t.cat].label}</div>
    <div class="tm">${esc(t.msg)}</div>
    <div class="mt">${meta}</div>
    ${menu}
  </div>`;
}
function eprMenu(t){
  const it=[];
  if(!t.ack) it.push('<button onclick="event.stopPropagation();eprAck(\''+t.id+'\')">'+ico('done_all')+'Acknowledge · received</button>');
  if(t.anchor) it.push('<button onclick="event.stopPropagation();EPR.menuFor=null;eprFlash();eprRender()">'+ico('my_location')+'Show anchor · '+t.anchor+'</button>');
  it.push('<button onclick="event.stopPropagation();EPR.menuFor=null;eprEscalate(\''+t.id+'\')">'+ico('upload_file')+'Escalate to record</button>');
  it.push('<button onclick="event.stopPropagation();eprResolve(\''+t.id+'\')">'+ico('check')+'Resolve · concern passed</button>');
  return '<div class="cm" role="menu">'+it.join('')+'</div>';
}
function eprMenuFor(id){EPR.menuFor=EPR.menuFor===id?null:id;eprRender();}
function eprGhosts(){
  return EPR.threads.filter(t=>t.status==='escalated').map(t=>`
    <div class="ecard ghost">
      <div class="th">${ico('upload_file')}Escalated · in the record</div>
      <div class="tm">${esc(t.msg)}</div>
      <div class="mt">Filed to Notes · ${t.escAt} · closes at 07:30</div>
    </div>`).join('');
}
function eprCompose(){
  return `
  <div class="ecompose">
    <div class="th" style="display:flex;gap:6px;align-items:center;font-size:9.5px;font-weight:700;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;">${ico('edit_note')}Your read, in your own words</div>
    <textarea id="ecmsg" maxlength="140" placeholder="e.g. Settles when the bay lights go down after 22:00."></textarea>
    <div class="ebar"><div id="ecfill"></div></div>
    <div style="font-size:10px;font-weight:600;color:var(--mut);" id="eclab">0 of 140</div>
    <div class="ecats" role="group" aria-label="Category">
      ${Object.keys(CATS).map(k=>'<button id="ecat-'+k+'" aria-pressed="false" onclick="eprPick(\''+k+'\')"><span class="cd" style="background:'+CATS[k].c+'"></span>'+CATS[k].label+'</button>').join('')}
    </div>
    <button class="ebtn big" id="ecsetlive" disabled onclick="eprSetLive()">${ico('send')}Set live</button>
    <button class="ebtn big ghost" onclick="EPR.composing=false;EPR.cat=null;eprRender()">Cancel</button>
  </div>`;
}
function eprWire(){const ta=el('ecmsg');ta.addEventListener('input',eprCheck);ta.focus();eprCheck();}
function eprCheck(){const n=el('ecmsg').value.length;el('ecfill').style.width=Math.min(100,n/140*100)+'%';el('eclab').textContent=n+' of 140';eprValid();}
function eprPick(k){EPR.cat=k;Object.keys(CATS).forEach(x=>el('ecat-'+x).setAttribute('aria-pressed',x===k));eprValid();}
function eprValid(){el('ecsetlive').disabled=!(el('ecmsg').value.trim().length>=4&&EPR.cat);}
function eprSetLive(){
  EPR.threads.push({id:'en'+Date.now(),cat:EPR.cat,msg:el('ecmsg').value.trim(),author:'Tom R, RN',time:'22:40',ack:null,anchor:null,status:'live'});
  EPR.composing=false;EPR.cat=null;eprRender();
  toast('Thread live. It rides the 07:30 handover and expires with it unless renewed.');
}
function eprAck(id){const t=EPR.threads.find(x=>x.id===id);t.ack={by:'Tom R, RN',at:'19:31'};EPR.menuFor=null;eprRender();toast('Received, never agreed. Your judgement stays your own.');}
function eprResolve(id){EPR.threads.find(x=>x.id===id).status='resolved';EPR.menuFor=null;eprRender();toast('Resolved. Gone from the active set, purged after 72 hours.');}
function eprFlash(){const p=el('eprNews');if(!p)return;p.classList.remove('flash');void p.offsetWidth;p.classList.add('flash');}
function eprEscalate(id){
  const t=EPR.threads.find(x=>x.id===id);EPR.menuFor=null;
  openModal(`<h3 id="modalTitle">Escalate into the record</h3>
    <p>The Thread closes and points to its permanent successor. Both names travel: the read's author and the escalating nurse.</p>
    <div class="epr"><b>EPR note · pre-filled, complete before filing</b><br><br>
    <b>Patient:</b> Margaret Hale · Bed 6<br>
    <b>Nursing observation (verbatim Thread):</b> ${esc(t.msg)}<br>
    <b>Originating author:</b> ${esc(t.author)} · ${t.time}<br>
    <b>Escalated by:</b> Tom R, RN · 19:32<br>
    <b>Clinical context:</b> <span style="opacity:.6;">[nurse completes: events, actions, plan]</span></div>
    <div class="btnrow">
      <button class="btn" onclick="eprFileEsc('${t.id}')">${ico('upload_file')}File to Notes</button>
      <button class="btn ghost" onclick="closeModal()">Back</button>
    </div>`);
}
function eprFileEsc(id){
  const t=EPR.threads.find(x=>x.id===id);t.status='escalated';t.escAt='19:32';
  closeModal();
  const list=el('eprNotesList');
  if(list){
    const item=document.createElement('div');
    item.className='enote flash';
    item.innerHTML='<div class="nh">19:32 · Nursing observation · T. Rowe RN <span class="provo"><span class="k"></span>Escalated from Thread · dual attribution</span></div>'
      +'<div class="nb">'+esc(t.msg)+' (Originating read: '+esc(t.author)+' 18:40. Escalated after review with on-call team.)</div>';
    list.prepend(item);
  }
  eprRender();
  toast('Filed to the record. The Thread is closed and now points at its successor.');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.cm')&&!e.target.closest('.kbb')){ if(EPR.menuFor){EPR.menuFor=null;eprRender();} }
});

/* ================= MODAL / DEMO / ABOUT / BOOT ================= */
function openModal(html){el('modalBox').innerHTML=html;el('overlay').classList.add('show');document.body.classList.add('lock');const b=el('modalBox').querySelector('button');if(b)b.focus();}
function closeModal(){el('overlay').classList.remove('show');document.body.classList.remove('lock');}
el('overlay').addEventListener('click',e=>{e.stopPropagation();if(e.target===el('overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeMenu();}});
function openDemo(){
  openModal(`<h3 id="modalTitle">Demo controls</h3>
  <p>Jump between scenarios, toggle the downtime edge case, or start over. The mono script panel narrates each step.</p>
  <div class="stack">
    <button class="btn ghost" onclick="jumpTo(1)">Scenario 1 · Priya captures a read</button>
    <button class="btn ghost" onclick="jumpTo(2)">Scenario 2 · The 19:30 handover</button>
    <button class="btn ghost" onclick="jumpTo(3)">Scenario 3 · Tom inherits the ward</button>
    <button class="btn ghost" onclick="jumpTo(4)">Scenario 4 · Add context &amp; end of shift</button>
    <button class="btn quiet" onclick="closeModal();showScript()">Show demo script panel</button>
    <button class="btn quiet" onclick="closeModal();toggleDowntime()">Edge case · toggle downtime</button>
    <button class="btn warn" onclick="resetDemo()">Reset everything</button>
  </div>`);
}
function toggleDowntime(){
  S.downtime=!S.downtime;
  el('downtimeBanner').style.display=S.downtime?'flex':'none';
  if(!S.downtime)toast('Service restored. Live Threads re-surface at the next handover with a downtime marker.');
  else go('ward');
}
function jumpTo(n){
  closeModal();resetState();
  if(n===1){setUser('priya');S.phase='day';S.clock='18:40';setStep(1);go('ward');}
  if(n===2){setUser('priya');S.phase='day';S.clock='19:25';seedAlisha();setStep(2);S.fabHo=true;go('ward');}
  if(n===3){setUser('tom');seedAlisha();relayAll();S.phase='night';S.clock='22:10';setStep(3);go('ward');}
  if(n===4){setUser('tom');seedAlisha();relayAll();S.phase='night';S.visitedAlisha=true;S.obsEventDone=true;S.obsEscalated=true;S.tomThreadDone=true;
    const a=S.patients.find(x=>x.id==='alisha');a.news=2;a.vit.rr.v=21;
    S.clock='06:45';setStep(4);go('endshift');}
}
function seedAlisha(){
  if(!S.threads.some(t=>t.p==='alisha'))
    S.threads.push({id:uid(),p:'alisha',cat:'comparison',msg:'Quieter than yesterday. Keep an eye overnight.',author:'Priya K, RN',time:'18:42',status:'live',renewals:0,ack:null,esc:null});
}
function relayAll(){S.threads.forEach((t,i)=>{if(t.status==='live'){t.status='acknowledged';t.ackm=32+i;t.ack={by:'Tom R, RN',time:'19:'+(32+i)};}});}
const INIT_T=JSON.stringify(S.threads),INIT_P=JSON.stringify(S.patients);
function resetState(){
  S.threads=JSON.parse(INIT_T);S.patients=JSON.parse(INIT_P);
  Object.assign(S,{hoIndex:0,hoT:0,hoStarted:false,obsEventDone:false,obsEscalated:false,tomThreadDone:false,downtime:false,patientOpen:null,endQueueDone:false,eileenFlag:false,visitedAlisha:false,lintDismissed:false,editTarget:null,fabHo:false});
  el('downtimeBanner').style.display='none';
}
function resetDemo(){closeModal();resetState();setUser('priya');S.phase='day';S.clock='18:40';S.scriptHidden=false;setStep(1);go('ward');}
function openAbout(){
  openModal(`<h3 id="modalTitle">About this prototype</h3>
  <p>A clickable simulation of Thread, the continuity protocol from the IRP In Good Hands. No data leaves this page; everything resets on reload.</p>
  <div class="stack" style="font-size:12.5px;font-weight:600;">
    <div class="tilebox" style="padding:15px;"><span class="lbl">Calm surfaces, colored threads</span><p style="margin-top:7px;color:var(--mut);">Patients are identified by name and a large bed anchor on calm, neumorphic cards. Color is reserved for Threads: each category owns one. No photos, no faces.</p></div>
    <div class="tilebox" style="padding:15px;"><span class="lbl">Interaction model</span><p style="margin-top:7px;color:var(--mut);">Text is paramount: the read leads every card, metadata folds behind Details. Handover relays one Thread at a time in a focus stack, with reminders. The floating bar carries the shift: Patients, End shift, then Begin handover.</p></div>
    <div class="tilebox" style="padding:15px;"><span class="lbl">Edge cases built in</span><p style="margin-top:7px;color:var(--mut);">140-character bound · clinical-value lint · five-Thread cap · skip-with-consequence at handover · renewal capped at three, with the reason shown · discharge routing to the transfer letter · downtime degrading to verbal handover.</p></div>
    <div class="tilebox" style="padding:15px;"><span class="lbl">Accessibility</span><p style="margin-top:7px;color:var(--mut);">Dark and light themes, both contrast-audited · grid and list layouts · keyboard operation with visible focus · targets 44px and above · aria-live announcements · disabled controls always say why and how to enable.</p></div>
  </div>
  <div class="btnrow" style="margin-top:13px;"><button class="btn" onclick="closeModal()">Back to the ward</button></div>`);
}
setUser('priya');S.phase='day';S.clock='18:40';setStep(1);go('ward');
</script>
