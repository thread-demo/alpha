<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thread · Ward 7B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200&display=swap" rel="stylesheet">
<style>
/* =====================================================
   THREAD v4
   · themable (dark default / light)
   · grid-first with list toggle
   · full-color square thread cards, text paramount
   · ambient sentence header (no status bento)
   · focus-stack handover with reminders
   · floating pill nav: Patients / End shift
   · demo script as a distinct mono overlay
   ===================================================== */
:root{
  --bg:#141110; --card:#1F1B18; --card2:#2A2521; --line:#372F29;
  --tx:#F0EAE0; --mut:#9C9385; --ink:#1C1712;
  --cobalt:#2E56E8; --cobalt-soft:#5C7CF0; --royal:#14225E; --royaltx:#DCE3FF;
  --copper:#A84E1D; --apricot:#E0956A; --redg:#B23A24; --amber:#D9A430; --sage:#8FAE7E;
  --shadow:0 12px 32px rgba(0,0,0,.5);
  --r:22px; --r-s:15px;
}
html[data-theme="light"]{
  --bg:#F1EDE4; --card:#FFFFFF; --card2:#E9E3D7; --line:#DCD4C5;
  --tx:#1C1712; --mut:#6E675C;
  --royal:#1A2A6E; --royaltx:#E4E9FF;
  --shadow:0 12px 28px rgba(60,50,40,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Instrument Sans',system-ui,sans-serif;
  background:var(--bg);color:var(--tx);
  font-size:15px;line-height:1.5;font-weight:500;
  -webkit-font-smoothing:antialiased;
  transition:background .2s,color .2s;
}
button{font:inherit;cursor:pointer;color:inherit;}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
:focus-visible{outline:3px solid var(--apricot);outline-offset:3px;border-radius:8px;}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
.ms{font-family:'Material Symbols Rounded';font-weight:400;font-style:normal;font-size:20px;line-height:1;display:inline-block;vertical-align:-4px;font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;}

/* ---------- shell / top bar ---------- */
.shell{max-width:1240px;margin:0 auto;padding:0 22px 150px;}
header.appbar{
  position:sticky;top:0;z-index:45;background:var(--bg);
  display:flex;align-items:center;gap:14px;
  padding:15px 0 12px;border-bottom:1px solid var(--line);
}
.logo{font-weight:700;font-size:21px;letter-spacing:-0.03em;display:flex;align-items:center;gap:9px;}
.logo .knot{width:14px;height:14px;border-radius:50%;background:var(--bg);border:5px solid var(--copper);}
.wardtag{font-weight:600;color:var(--mut);font-size:11.5px;letter-spacing:.1em;}
.topright{margin-left:auto;display:flex;align-items:center;gap:10px;position:relative;}
.userchip{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:99px;padding:5px 14px 5px 5px;font-weight:600;font-size:12.5px;}
.nav-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:var(--ink);font-weight:700;font-size:11.5px;}
.nav-av.priya{background:#9FB4FF;} .nav-av.tom{background:#8FE0C0;}
.iconbtn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;}
.backlink{width:40px;height:40px;border-radius:11px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--tx);text-decoration:none;flex:none;}
.backlink:hover{background:var(--card2);}
.backlink .ms{font-size:20px;}
.iconbtn .ms{font-size:20px;}

/* settings dropdown */
.menu{
  position:absolute;top:52px;right:0;width:300px;background:var(--card);
  border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);
  padding:10px;z-index:70;display:none;
}
.menu.open{display:block;}
.menu .mrow{display:flex;align-items:center;gap:10px;width:100%;padding:11px 12px;border-radius:11px;border:none;background:none;font-weight:600;font-size:13.5px;text-align:left;}
.menu .mrow:hover{background:var(--card2);}
.menu .mrow .ms{font-size:19px;color:var(--mut);}
.menu .mlabel{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);padding:10px 12px 4px;}
.seg{display:flex;background:var(--card2);border-radius:11px;padding:3px;gap:3px;margin-left:auto;}
.seg button{border:none;background:none;border-radius:8px;padding:6px 11px;font-weight:700;font-size:11.5px;color:var(--mut);}
.seg button[aria-pressed="true"]{background:var(--cobalt);color:#fff;}

/* ---------- ambient header (non-bento, minimises) ---------- */
.ambient{
  position:sticky;top:60px;z-index:40;background:var(--bg);
  padding:18px 0 14px;border-bottom:1px solid var(--line);margin-bottom:20px;
  transition:padding .18s;
}
.ambient .aline{font-size:clamp(19px,2.4vw,27px);font-weight:700;letter-spacing:-0.03em;line-height:1.3;transition:font-size .18s;}
.ambient .aline b{color:var(--cobalt-soft);font-weight:700;}
.ambient .aline .warm{color:var(--apricot);}
.ambient .asub{color:var(--mut);font-weight:500;font-size:13px;margin-top:5px;transition:opacity .18s, max-height .18s;max-height:40px;overflow:hidden;}
.ambient.mini{padding:9px 0 8px;}
.ambient.mini .aline{font-size:16px;}
.ambient.mini .asub{opacity:0;max-height:0;margin:0;}

/* ---------- type ---------- */
h1.pagetitle{font-size:clamp(22px,2.8vw,30px);font-weight:700;letter-spacing:-0.03em;margin:4px 0 2px;}
.pagesub{color:var(--mut);font-weight:500;margin-bottom:16px;font-size:13px;max-width:82ch;}
.lbl{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);display:inline-flex;align-items:center;gap:6px;}
.lbl .ms{font-size:14px;vertical-align:-3px;}
.num{font-weight:700;letter-spacing:-0.04em;line-height:.95;font-variant-numeric:tabular-nums;}
.section-label{font-size:10.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin:24px 0 12px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:"";flex:1;height:1px;background:var(--line);}
.section-label .viewtog{margin-left:auto;display:flex;gap:4px;}
.screen{display:none;} .screen.active{display:block;}
.stack{display:flex;flex-direction:column;gap:12px;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:13px;font-weight:700;letter-spacing:.02em;font-size:13.5px;padding:12px 18px;min-height:46px;background:var(--cobalt);color:#fff;transition:filter .1s,transform .05s;}
.btn:hover{filter:brightness(1.1);} .btn:active{transform:scale(.985);}
.btn.copper{background:var(--copper);}
.btn.royal{background:var(--royal);color:var(--royaltx);}
.btn.quiet{background:var(--card2);color:var(--tx);}
.btn.ghost{background:transparent;border:1.5px solid var(--line);color:var(--tx);}
.btn.onink{background:rgba(20,16,12,.85);color:#fff;}
.btn.big{width:100%;font-size:14.5px;min-height:54px;}
.btn:disabled{background:var(--card2);color:var(--mut);cursor:not-allowed;filter:none;}
.btn .ms{font-size:18px;}
.whydisabled{font-size:12px;font-weight:600;color:var(--apricot);margin-top:8px;display:flex;gap:6px;align-items:flex-start;}
.whydisabled .ms{font-size:15px;margin-top:1px;}

/* ---------- patient cards ---------- */
.pgrid{display:grid;gap:14px;grid-template-columns:repeat(4,1fr);}
@media(max-width:1100px){.pgrid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:860px){.pgrid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:540px){.pgrid{grid-template-columns:1fr;}}
.pgrid.list{grid-template-columns:1fr;gap:10px;}
.pcard{
  border-radius:var(--r);padding:16px;text-align:left;border:none;
  background:var(--pc,#ccc);color:var(--ink);
  display:flex;flex-direction:column;gap:12px;min-height:220px;
  transition:transform .12s,box-shadow .12s;
}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.pgrid.list .pcard{flex-direction:row;align-items:center;min-height:0;padding:13px 16px;gap:14px;flex-wrap:wrap;}
.pcard .top{display:flex;align-items:flex-start;gap:11px;width:100%;}
.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-weight:700;font-size:14px;background:var(--ink);color:var(--pc,#fff);}
.avatar.sm{width:22px;height:22px;font-size:9px;}
.pname{font-weight:700;font-size:17px;letter-spacing:-0.02em;line-height:1.15;}
.pdx{font-size:11.5px;font-weight:600;opacity:.82;line-height:1.4;margin-top:2px;}
.bedanchor{margin-left:auto;flex-shrink:0;background:var(--ink);color:var(--pc,#fff);border-radius:13px;padding:7px 11px 6px;text-align:center;line-height:1;}
.bedanchor .b{font-size:8px;font-weight:700;letter-spacing:.18em;display:block;opacity:.8;margin-bottom:3px;}
.bedanchor .n{font-size:21px;font-weight:700;}
.pcard .mid{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-top:auto;width:100%;}
.pgrid.list .pcard .mid{margin:0 0 0 auto;width:auto;gap:20px;flex-wrap:wrap;justify-content:flex-end;}
@media(max-width:520px){.pgrid.list .pcard .mid{margin:0;width:100%;justify-content:space-between;}}
.newsmini{display:flex;align-items:flex-end;gap:9px;}
.newsmini .nv{font-size:34px;font-weight:700;letter-spacing:-0.05em;line-height:.9;}
.newsmini .nk{font-size:8.5px;font-weight:700;letter-spacing:.16em;opacity:.8;display:block;margin-bottom:4px;}
.pcard svg.spark{width:80px;height:24px;}
.ringwrap{display:flex;flex-direction:column;align-items:center;gap:3px;}
.ringwrap .rk{font-size:8px;font-weight:700;letter-spacing:.16em;opacity:.8;}
.pflag{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:7px;padding:4px 8px;background:var(--ink);color:var(--pc,#fff);}
.pflag .ms{font-size:12px;}
.pcard .foot{display:flex;gap:6px;flex-wrap:wrap;width:100%;}
.pgrid.list .pcard .foot{width:auto;}

/* ---------- THREAD CARDS · full color squares, text paramount ---------- */
.tgrid{display:grid;gap:13px;grid-template-columns:repeat(3,1fr);}
@media(max-width:1100px){.tgrid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.tgrid{grid-template-columns:1fr;}}
.tgrid.list{grid-template-columns:1fr;}
.tcard{
  border-radius:var(--r);padding:18px;border:none;position:relative;
  display:flex;flex-direction:column;gap:12px;min-height:210px;
  color:#fff;text-align:left;
}
.tgrid.list .tcard{min-height:0;}
.tcard.comparison{background:var(--cobalt);}
.tcard.pattern{background:#2333B8;}
.tcard.concern{background:var(--redg);}
.tcard.priority{background:var(--amber);color:var(--ink);}
.tcard.context{background:var(--apricot);color:var(--ink);}
.tcard .thead{display:flex;align-items:center;gap:8px;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.92;}
.tcard .thead .ms{font-size:16px;}
.tcard .thead .right{margin-left:auto;display:flex;gap:8px;align-items:center;font-size:9.5px;letter-spacing:.1em;opacity:.85;}
.livedot{width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block;}
.tcard .tmsg{font-size:clamp(18px,1.8vw,22px);font-weight:700;letter-spacing:-0.02em;line-height:1.32;flex:1;}
.tgrid.list .tcard .tmsg{font-size:18px;}
.tcard .tfoot{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;opacity:.92;}
.tcard .tfoot .detbtn{margin-left:auto;border:none;background:rgba(0,0,0,.22);color:inherit;border-radius:10px;padding:8px 13px;font-weight:700;font-size:11px;letter-spacing:.06em;display:inline-flex;gap:6px;align-items:center;min-height:34px;}
.tcard.priority .detbtn,.tcard.context .detbtn{background:rgba(255,255,255,.4);}
.tdetails{background:rgba(0,0,0,.24);border-radius:14px;padding:12px 14px;font-size:12px;font-weight:600;display:none;}
.tcard.priority .tdetails,.tcard.context .tdetails{background:rgba(255,255,255,.42);}
.tdetails.open{display:block;}
.tdetails .drow{display:flex;justify-content:space-between;gap:10px;padding:4px 0;}
.tdetails .drow span:first-child{opacity:.8;letter-spacing:.08em;text-transform:uppercase;font-size:9.5px;font-weight:700;padding-top:2px;}
.tdetails .dact{display:flex;gap:8px;margin-top:9px;}
.tdetails .dact .btn{flex:1;min-height:40px;padding:8px 12px;font-size:11.5px;background:rgba(0,0,0,.3);}
.tcard.priority .dact .btn,.tcard.context .dact .btn{background:rgba(20,16,12,.85);color:#fff;}
.tdot{width:11px;height:11px;border-radius:3.5px;display:inline-block;}
.tdot.concern{background:var(--redg);} .tdot.priority{background:var(--amber);}
.tdot.pattern{background:#2333B8;} .tdot.comparison{background:var(--cobalt);} .tdot.context{background:var(--apricot);}

/* ---------- vitals ---------- */
.vgrid{display:grid;gap:12px;grid-template-columns:repeat(6,1fr);}
@media(max-width:1100px){.vgrid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:560px){.vgrid{grid-template-columns:repeat(2,1fr);}}
.vgrid.list{grid-template-columns:1fr;}
.vg3{grid-template-columns:repeat(3,1fr);}
@media(max-width:560px){.vg3{grid-template-columns:repeat(2,1fr);}}
.vgrid.vg3.list{grid-template-columns:1fr;}
.vtile{border-radius:var(--r-s);padding:13px 14px;background:var(--card);border:1px solid var(--line);display:flex;flex-direction:column;gap:6px;min-height:102px;justify-content:space-between;}
.vgrid.list .vtile{flex-direction:row;align-items:center;min-height:0;}
.vtile .num{font-size:23px;} .vtile .unit{font-size:10px;font-weight:700;color:var(--mut);margin-left:2px;}
.vtile.alert{background:#39170C;border-color:var(--copper);}
.vtile.alert *{color:#F3C9B2;}
html[data-theme="light"] .vtile.alert{background:#F6DCCB;}
html[data-theme="light"] .vtile.alert *{color:#7A3512;}
svg.spark{display:block;}
.fluid{display:flex;height:11px;border-radius:7px;overflow:hidden;background:var(--card2);min-width:110px;}
.fluid .in{background:var(--cobalt);} .fluid .out{background:var(--copper);}
.fluidkey{display:flex;justify-content:space-between;font-size:9px;font-weight:700;color:var(--mut);letter-spacing:.06em;}

/* shift pulse · fixed circles */
.pulse{display:flex;gap:0;justify-content:space-between;align-items:center;padding:4px 2px;}
.pulse i{width:9px;height:9px;border-radius:50%;background:var(--card2);flex:none;}
.pulse i.on{width:13px;height:13px;}
.tilebox{border-radius:var(--r);padding:18px;background:var(--card);border:1px solid var(--line);}
.legend-obs{color:#5C7CF0;}
.legend-thr{color:var(--apricot);}
html[data-theme="light"] .legend-obs{color:#2340B8;}
html[data-theme="light"] .legend-thr{color:#9A4715;}

/* ---------- patient header band ---------- */
.pheader{border-radius:var(--r);padding:18px 20px;background:var(--pc);color:var(--ink);display:flex;align-items:center;gap:15px;flex-wrap:wrap;}
.pheader .avatar{width:54px;height:54px;font-size:17px;}
.pheader .pname{font-size:clamp(19px,2.4vw,26px);}
.pheader .right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.pbody{display:grid;gap:14px;grid-template-columns:5fr 7fr;align-items:start;margin-top:14px;}
@media(max-width:960px){.pbody{grid-template-columns:1fr;}}
.ai{background:var(--royal);border-radius:var(--r);padding:18px 20px;color:var(--royaltx);}
.ai ul{list-style:none;margin-top:10px;}
.ai li{font-weight:600;font-size:13.5px;padding:6px 0 6px 26px;position:relative;line-height:1.45;}
.ai li .ms{position:absolute;left:0;top:7px;font-size:15px;color:var(--cobalt-soft);}

/* ---------- handover focus stack ---------- */
.hostage{position:relative;max-width:640px;margin:6px auto 0;min-height:320px;}
.hostage .tcard{position:absolute;inset:0 auto auto 0;width:100%;min-height:280px;transition:transform .18s,opacity .18s,filter .18s;}
.hostage .tcard.back1{transform:translateY(-16px) scale(.955);filter:brightness(.72);z-index:1;}
.hostage .tcard.back2{transform:translateY(-30px) scale(.915);filter:brightness(.5);z-index:0;}
.hostage .tcard.front{position:relative;z-index:2;box-shadow:var(--shadow);}
.hodeck-count{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);text-align:center;margin-top:12px;}
.hoactions{display:flex;gap:10px;max-width:640px;margin:14px auto 0;}
.hoactions .btn{flex:1;}
.ho-progress{display:flex;gap:6px;margin:6px 0 14px;}
.ho-progress span{flex:1;height:6px;border-radius:99px;background:var(--card2);}
.ho-progress span.done{background:var(--cobalt);} .ho-progress span.now{background:var(--apricot);}

/* ---------- banners / toast / modal ---------- */
.banner{border-radius:var(--r);padding:14px 17px;font-weight:600;font-size:13px;margin-bottom:13px;display:flex;gap:11px;align-items:center;flex-wrap:wrap;}
.banner .ms{font-size:19px;flex-shrink:0;}
.banner.warn{background:#33230B;color:#E9C87E;}
.banner.alert{background:#3A160E;color:#EFA184;}
.banner.info{background:var(--royal);color:var(--royaltx);}
html[data-theme="light"] .banner.warn{background:#F2E3BC;color:#6B5100;}
html[data-theme="light"] .banner.alert{background:#F6D3C6;color:#8E2415;}
.banner .btn{margin-left:auto;padding:8px 14px;min-height:40px;font-size:11.5px;}
#toast{position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:var(--tx);color:var(--bg);font-weight:700;font-size:13px;border-radius:14px;padding:13px 21px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:90;max-width:min(580px,90vw);text-align:center;}
#toast.show{opacity:1;}
.overlay{position:fixed;inset:0;background:rgba(8,6,4,.72);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--line);border-radius:22px;max-width:640px;width:100%;padding:24px;max-height:88vh;overflow:auto;}
.modal h3{font-size:19px;font-weight:700;letter-spacing:-0.02em;margin-bottom:7px;}
.modal p{font-weight:500;color:var(--mut);font-size:13px;margin-bottom:13px;}
.epr{background:var(--bg);border:1.5px dashed var(--cobalt-soft);border-radius:var(--r-s);padding:15px;font-size:13px;font-weight:500;margin:10px 0 16px;color:var(--tx);}
.epr b{font-weight:700;}
.btnrow{display:flex;gap:11px;flex-wrap:wrap;}
.btnrow .btn{flex:1;}

/* ---------- floating pill nav ---------- */
.fab{
  position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:60;
  display:flex;align-items:center;gap:4px;background:var(--card);
  border:1px solid var(--line);border-radius:99px;padding:6px;box-shadow:var(--shadow);
}
.fab .fbtn{border:none;background:none;border-radius:99px;padding:11px 20px;font-weight:700;font-size:13px;display:inline-flex;gap:8px;align-items:center;min-height:48px;color:var(--mut);}
.fab .fbtn[aria-current="true"]{background:var(--cobalt);color:#fff;}
.fab .fbtn.end{color:var(--tx);}
.fab .fbtn .ms{font-size:19px;}
.fab .fdivider{width:1px;height:26px;background:var(--line);}
.fab .homorph{background:var(--copper);color:#fff;}

/* ---------- demo script overlay · distinct mono ---------- */
.script{
  position:fixed;left:18px;bottom:18px;z-index:65;max-width:340px;
  background:#0E0C0A;color:#E8E2D6;border:1.5px dashed var(--apricot);
  border-radius:16px;padding:14px 16px;font-family:'DM Mono',monospace;
  box-shadow:var(--shadow);
}
html[data-theme="light"] .script{background:#221D18;}
.script .stag{font-size:9.5px;letter-spacing:.22em;color:var(--apricot);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.script .stag button{border:none;background:none;color:var(--apricot);font-family:inherit;font-size:16px;min-width:34px;min-height:34px;display:grid;place-items:center;border-radius:8px;margin:-8px -8px -8px 0;}
.script h2{font-size:12.5px;font-weight:500;line-height:1.5;margin-bottom:4px;color:#fff;}
.script p{font-size:11px;line-height:1.65;color:#B5AC9D;}
@media(max-width:760px){.script{left:12px;right:12px;max-width:none;bottom:84px;}}

/* misc */
.eventcard{border-radius:var(--r);background:#39170C;border:1.5px solid var(--copper);padding:18px;margin-bottom:14px;}
html[data-theme="light"] .eventcard{background:#F6DCCB;}
.eventcard h3{color:var(--apricot);font-weight:700;font-size:15.5px;display:flex;gap:9px;align-items:center;margin-bottom:7px;}
html[data-theme="light"] .eventcard h3{color:#8E3A12;}
.eventcard p{font-weight:600;font-size:13.5px;margin-bottom:13px;}
.relayline{display:flex;align-items:center;margin:16px 0 4px;flex-wrap:wrap;}
.relaynode{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:80px;}
.relaynode .dotk{width:15px;height:15px;border-radius:50%;border:5px solid var(--copper);background:var(--bg);}
.relaynode .rl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);text-align:center;line-height:1.5;}
.relayseg{flex:1;height:3px;background:var(--copper);min-width:18px;transform:translateY(-10px);}
.hero{background:var(--cobalt);color:#fff;border-radius:26px;padding:30px;margin-bottom:14px;position:relative;overflow:hidden;display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:center;}
@media(max-width:820px){.hero{grid-template-columns:1fr;}}
.hero h1{font-size:clamp(26px,3.6vw,42px);font-weight:700;line-height:1.04;letter-spacing:-0.04em;}
.hero p{font-weight:600;font-size:13.5px;opacity:.92;margin-top:10px;max-width:56ch;}
.hero img{width:100%;height:220px;object-fit:cover;border-radius:16px;display:block;}
.rolegrid{display:grid;gap:13px;grid-template-columns:repeat(2,1fr);margin-top:16px;}
@media(max-width:760px){.rolegrid{grid-template-columns:1fr;}}
.rolecard{text-align:left;display:flex;gap:14px;align-items:center;padding:18px;border-radius:var(--r);border:none;color:var(--ink);transition:transform .12s;}
.rolecard:hover{transform:translateY(-3px);}
.rolecard h3{font-size:16px;font-weight:700;}
.rolecard p{font-weight:600;font-size:11.5px;margin-top:2px;opacity:.82;}
.rolecard .ms{margin-left:auto;}

/* v5 additions */
.pname,.pdx{display:block;}
.timg{width:100%;height:112px;object-fit:cover;border-radius:12px;display:block;}
.tgrid.list .timg{height:88px;max-width:220px;}
.decide{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;}
.decide .btn{min-height:48px;padding:8px 10px;font-size:12px;line-height:1.15;}
.legend{display:flex;gap:18px;flex-wrap:wrap;font-size:11.5px;font-weight:600;color:var(--mut);margin:12px 0 0;}
.legend span{display:inline-flex;gap:6px;align-items:flex-start;max-width:34ch;}
.legend .ms{font-size:15px;margin-top:1px;flex:none;}
#newfab{position:fixed;right:18px;bottom:90px;z-index:58;border-radius:99px;padding:14px 22px;box-shadow:var(--shadow);display:none;}
.hocard{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}
.hocard .hleft{min-width:0;display:flex;flex-direction:column;gap:8px;}
.hocard .hacts{display:flex;flex-direction:column;gap:8px;}
.hocard .hacts .btn{min-height:44px;padding:9px 14px;font-size:12px;}
.hp-strip{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--pc);color:var(--ink);border-radius:var(--r);padding:12px 16px;margin-bottom:12px;}
.hp-strip .avatar{width:38px;height:38px;font-size:12px;}
body.lock{overflow:hidden;}
.segbig{display:flex;background:var(--card2);border-radius:12px;padding:3px;gap:3px;}
.segbig button{border:none;background:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:12px;color:var(--mut);min-height:38px;}
.segbig button[aria-pressed="true"]{background:var(--cobalt);color:#fff;}
@media(max-width:1100px){
  .tcard .tmsg{font-size:18px;}
  .tgrid.list .tcard .tmsg{font-size:16.5px;}
  h1.pagetitle{font-size:22px;}
  .ambient .aline{font-size:19px;}
  .pcard{min-height:198px;}
  .pname{font-size:16px;}

}

/* v6 · neumorphic surfaces, tooltips, affordances */
:root{--shdark:#0b0906;--shlight:#241f16;}
html[data-theme="light"]{--bg:#EDE9E0;--card:#EDE9E0;--card2:#E0DBCD;--line:#D6D0C1;--shdark:#d2ccbd;--shlight:#ffffff;}
.pcard,.tilebox,.vtile,.hp-strip,.pheader,.menu,.fab{
  background:var(--bg);border:none;
  box-shadow:9px 9px 18px var(--shdark),-9px -9px 18px var(--shlight);
}
.pcard{color:var(--tx);}
.pcard:hover{transform:translateY(-3px);box-shadow:12px 12px 22px var(--shdark),-10px -10px 20px var(--shlight);}
.avatar{background:var(--tx);color:var(--bg);}
.bedanchor{background:transparent;color:var(--tx);box-shadow:inset 4px 4px 9px var(--shdark),inset -4px -4px 9px var(--shlight);}
.pflag{background:var(--tx);color:var(--bg);}
.pdx{color:var(--mut);opacity:1;}
.newsmini .nk,.ringwrap .rk{color:var(--mut);opacity:1;}
.vtile.alert{background:var(--bg);box-shadow:inset 5px 5px 10px var(--shdark),inset -5px -5px 10px var(--shlight);}
.vtile.alert .lbl,.vtile.alert .num,.vtile.alert .ms{color:var(--redg);}
.btn.warn{background:var(--amber);color:var(--ink);}
.fab .homorph{background:var(--cobalt);}
details.tilebox summary{display:flex;align-items:center;gap:8px;}
details.tilebox .chev{margin-left:auto;transition:transform .15s;font-size:20px;color:var(--mut);}
details.tilebox[open] .chev{transform:rotate(180deg);}
[data-tip]{position:relative;}
[data-tip]::after{
  content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 9px);transform:translateX(-50%);
  background:var(--tx);color:var(--bg);font-size:11px;font-weight:600;line-height:1.5;
  padding:8px 11px;border-radius:10px;width:max-content;max-width:230px;white-space:normal;text-align:left;
  letter-spacing:.01em;text-transform:none;opacity:0;pointer-events:none;transition:opacity .12s;z-index:40;
}
[data-tip]:hover::after,[data-tip]:focus-visible::after,[data-tip].tipon::after{opacity:1;}
.pulse i{width:9px;height:9px;border-radius:50%;background:var(--card2);flex:none;}
.pulse button{border:none;flex:none;cursor:pointer;min-height:0;width:34px;height:34px;padding:10px;border-radius:50%;background-clip:content-box;margin:-10px -6px;}
.pulse button:focus-visible{outline:2.5px solid var(--apricot);outline-offset:2px;}

.pheader{padding:14px 18px;gap:13px;}
.pheader .avatar{width:46px;height:46px;font-size:14px;}
.pheader .pname{font-size:clamp(17px,2vw,22px);}

/* ===== EPR integration view (embedded concept) ===== */
.eprv{--ebg:#EDF0F4;--epanel:#FFFFFF;--eline:#D6DCE5;--etx:#1E2936;--emut:#5C6B7E;--eblue:#2F5FA5;--etop:#24466E;--ealert:#B3261E;}
.eprv{font-family:'Inter','Instrument Sans',system-ui,sans-serif;}
.eprv .lede{color:var(--mut);font-weight:500;font-size:13.5px;max-width:80ch;margin-bottom:14px;}
.eprv .frame{border:1px solid var(--eline);border-radius:16px;overflow:hidden;max-width:100%;box-shadow:var(--shadow);position:relative;background:var(--ebg);}
.eprv .etop{background:var(--etop);color:#fff;display:flex;align-items:center;gap:12px;padding:8px 13px;font-size:12px;flex-wrap:wrap;}
.eprv .etop .sys{font-weight:700;letter-spacing:.03em;display:flex;gap:7px;align-items:center;}
.eprv .etop .env{background:#3A5F8F;border-radius:3px;padding:2px 7px;font-size:10px;font-weight:600;letter-spacing:.05em;}
.eprv .etop .right{margin-left:auto;color:#C4D2E6;font-size:11.5px;}
.eprv .ebanner{background:var(--epanel);border-bottom:1px solid var(--eline);padding:9px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.eprv .ebanner .pn{font-size:15px;font-weight:700;color:var(--etx);}
.eprv .ebanner .dm{color:var(--emut);font-size:11.5px;}
.eprv .ebanner .echip{border:1px solid var(--eline);border-radius:3px;padding:3px 7px;font-size:10.5px;font-weight:600;color:var(--emut);background:#F6F8FB;}
.eprv .ebanner .echip.al{color:var(--ealert);border-color:#E4B6B2;background:#FBEFEE;}
.eprv .etabs{background:var(--epanel);border-bottom:1px solid var(--eline);padding:0 14px;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.eprv .etabs::-webkit-scrollbar{display:none;}
.eprv .stage{max-width:100%;overflow:hidden;}
.eprv .etabs span{padding:8px 12px;font-size:12px;font-weight:600;color:var(--emut);border-bottom:2.5px solid transparent;white-space:nowrap;}
.eprv .etabs span.on{color:var(--eblue);border-color:var(--eblue);}
.eprv .egrid{padding:14px;display:grid;gap:12px;grid-template-columns:repeat(12,1fr);}
.eprv .ep{background:var(--epanel);border:1px solid var(--eline);border-radius:5px;grid-column:span 6;}
.eprv .ep.w6{grid-column:span 6;}.eprv .ep.w12{grid-column:span 12;}
@media(max-width:820px){.eprv .ep,.eprv .ep.w6{grid-column:span 12;}}
.eprv .eh{display:flex;align-items:center;gap:7px;padding:8px 11px;border-bottom:1px solid var(--eline);font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--emut);text-transform:uppercase;}
.eprv .eh .ms{font-size:15px;color:#8DA0B8;}
.eprv .eb{padding:10px 11px;color:var(--etx);}
.eprv .ekv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:12px;border-bottom:1px solid #EDF1F6;}
.eprv .ekv:last-child{border:none;}.eprv .ekv b{font-weight:600;}
.eprv .news{display:flex;align-items:flex-end;gap:12px;}
.eprv .news .n{font-size:30px;font-weight:700;color:#1F7A33;line-height:1;}
.eprv .news svg{max-width:100%;height:auto;}
.eprv .egrid{max-width:100%;}
.eprv .eb{overflow-wrap:anywhere;}
.eprv .enote{padding:8px 10px;border:1px solid #E6EBF2;border-radius:5px;margin-bottom:7px;background:#FBFCFE;}
.eprv .enote .nh{display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:10.5px;color:var(--emut);font-weight:600;margin-bottom:3px;}
.eprv .enote .nb{font-size:12px;color:var(--etx);}
.eprv .provo{display:inline-flex;align-items:center;gap:5px;background:#F4E9E1;border:1px solid #E3C9B6;color:#8A4A1E;border-radius:3px;padding:1px 6px;font-size:9.5px;font-weight:700;}
.eprv .provo .k{width:8px;height:8px;border-radius:50%;border:3px solid #D2292B;display:inline-block;}
.eprv .flash{animation:eflash 1.7s ease;}
@keyframes eflash{0%{box-shadow:0 0 0 0 rgba(210,41,43,0);}25%{box-shadow:0 0 0 4px rgba(210,41,43,.5);}100%{box-shadow:0 0 0 0 rgba(210,41,43,0);}}
/* thread chip inside EPR banner */
.eprv .tchip{font-family:'Instrument Sans';display:inline-flex;align-items:center;gap:8px;background:var(--bg);color:var(--tx);border-radius:99px;padding:6px 12px 6px 8px;font-weight:700;font-size:12px;box-shadow:5px 5px 11px var(--shdark),-4px -4px 9px var(--shlight);margin-left:auto;}
.eprv .tchip .k{width:11px;height:11px;border-radius:50%;border:4px solid #D2292B;}
.eprv .tchip .c{background:var(--tx);color:var(--bg);border-radius:7px;padding:1px 7px;font-size:11px;}
/* embedded drawer (relative, not fixed) */
.eprv .stage{display:grid;grid-template-columns:1fr 356px;gap:0;align-items:stretch;}
@media(max-width:900px){.eprv .stage{grid-template-columns:1fr;}.eprv .edrawer{display:none;}.eprv.showdrawer .edrawer{display:flex;}.eprv.showdrawer .eprcol{display:none;}}
.eprv .edrawer{background:var(--bg);border-left:1px solid var(--line);border-radius:0 16px 16px 0;display:flex;flex-direction:column;font-family:'Instrument Sans';}
.eprv .dh{display:flex;align-items:center;gap:9px;padding:13px 14px 9px;}
.eprv .dh .logo svg{height:19px;width:auto;display:block;}
.eprv .dh .hg{margin-left:auto;display:flex;gap:7px;}
.eprv .dh .nb{display:inline-flex;align-items:center;gap:5px;background:var(--cobalt);color:#fff;border-radius:9px;padding:6px 11px;font-weight:700;font-size:11px;min-height:32px;}
.eprv .dh .cl{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;box-shadow:inset 3px 3px 6px var(--shdark),inset -3px -3px 6px var(--shlight);}
.eprv .dsub{padding:0 14px 11px;font-size:11px;font-weight:600;color:var(--mut);}
.eprv .dsub b{color:var(--tx);}
.eprv .dbody{flex:1;overflow:auto;padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;max-height:560px;}
.eprv .dfoot{padding:10px 14px;font-size:9.5px;font-weight:600;color:var(--mut);line-height:1.6;border-top:1px solid var(--line);}
.eprv .ecard{border-radius:15px;padding:13px 14px;color:#fff;display:flex;flex-direction:column;gap:7px;position:relative;}
.eprv .ecard.concern{background:var(--redg);}.eprv .ecard.context{background:var(--apricot);color:var(--ink);}
.eprv .ecard.pattern{background:#2333B8;}.eprv .ecard.comparison{background:var(--cobalt);}.eprv .ecard.priority{background:var(--amber);color:var(--ink);}
.eprv .ecard .th{display:flex;align-items:center;gap:6px;padding-right:34px;font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;opacity:.95;}
.eprv .ecard .tm{font-size:14px;font-weight:700;letter-spacing:-0.01em;line-height:1.4;}
.eprv .ecard .mt{font-size:10px;font-weight:600;opacity:.92;line-height:1.6;}
.eprv .kbb{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:rgba(0,0,0,.16);z-index:3;}
.eprv .ecard.context .kbb,.eprv .ecard.priority .kbb{background:rgba(255,255,255,.4);}
.eprv .kbb .ms{font-size:16px;}
.eprv .cm{position:absolute;top:38px;right:8px;z-index:6;background:#17130E;color:#F0EAE0;border-radius:11px;padding:5px;min-width:210px;box-shadow:0 16px 32px rgba(0,0,0,.42);display:flex;flex-direction:column;}
.eprv .cm button{display:flex;gap:8px;align-items:center;text-align:left;padding:8px 10px;border-radius:7px;font-size:11px;font-weight:600;font-family:'Instrument Sans';color:#F0EAE0;background:none;border:none;}
.eprv .cm button:hover{background:rgba(255,255,255,.09);}
.eprv .cm .ms{font-size:15px;opacity:.85;}
.eprv .ghost{background:transparent;color:var(--tx);box-shadow:inset 4px 4px 9px var(--shdark),inset -4px -4px 9px var(--shlight);}
.eprv .ghost .th{color:var(--mut);}.eprv .ghost .tm{color:var(--mut);font-size:12.5px;}
.eprv .ecompose{border-radius:15px;padding:13px;box-shadow:9px 9px 18px var(--shdark),-9px -9px 18px var(--shlight);display:flex;flex-direction:column;gap:9px;}
.eprv .ecompose textarea{font:inherit;font-family:'Instrument Sans';font-weight:600;font-size:13.5px;line-height:1.45;border:1.5px solid var(--line);border-radius:11px;padding:10px 11px;background:var(--card2);color:var(--tx);min-height:70px;resize:vertical;}
.eprv .ecompose textarea:focus{outline:none;border-color:var(--cobalt);}
.eprv .ebar{height:6px;border-radius:99px;background:var(--card2);overflow:hidden;}
.eprv .ebar>div{height:100%;width:0;background:var(--cobalt);transition:width .1s;}
.eprv .ecats{display:flex;gap:6px;flex-wrap:wrap;}
.eprv .ecats button{border-radius:9px;padding:6px 9px;font-size:10px;font-weight:700;letter-spacing:.04em;display:inline-flex;gap:5px;align-items:center;box-shadow:inset 3px 3px 6px var(--shdark),inset -3px -3px 6px var(--shlight);min-height:34px;color:var(--tx);background:var(--bg);}
.eprv .ecats button[aria-pressed="true"]{box-shadow:none;outline:2px solid var(--tx);}
.eprv .cd{width:10px;height:10px;border-radius:4px;display:inline-block;}
.eprv .ebtn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:11px;font-weight:700;font-size:12px;padding:9px 13px;min-height:40px;background:var(--cobalt);color:#fff;border:none;font-family:'Instrument Sans';}
.eprv .ebtn.big{width:100%;}.eprv .ebtn:disabled{background:var(--card2);color:var(--mut);cursor:not-allowed;}
.eprv .flowrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.eprv .flowstep{flex:1;min-width:150px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;}
.eprv .flowstep .sn{width:22px;height:22px;border-radius:7px;background:var(--cobalt);color:#fff;font-weight:700;font-size:12px;display:grid;place-items:center;margin-bottom:7px;}
.eprv .flowstep h4{font-size:12.5px;font-weight:700;margin-bottom:3px;}
.eprv .flowstep p{font-size:11.5px;color:var(--mut);font-weight:500;line-height:1.5;}
.eprv .mobcue{display:none;}
@media(max-width:900px){.eprv .mobcue{display:flex;}}

/* ================= VIS HELPERS ================= */
function sparkBars(vals,color,max,w,h){
  max=max||Math.max(...vals,1);w=w||80;h=h||24;const bw=w/vals.length;
  return '<svg class="spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" role="img" aria-label="12 hour trend">'+
    vals.map((v,i)=>{const bh=Math.max(2.5,(v/max)*h);
      return '<rect x="'+(i*bw+1).toFixed(1)+'" y="'+(h-bh).toFixed(1)+'" width="'+(bw-2).toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="1.5" fill="'+color+'" opacity="'+(i===vals.length-1?'1':'0.45')+'"/>';}).join('')+'</svg>';
}
function sparkLine(vals,color,max,w,h){
  max=max||Math.max(...vals,1);w=w||96;h=h||24;
  const pts=vals.map((v,i)=>((i/(vals.length-1))*(w-6)+3).toFixed(1)+','+(h-3-(v/max)*(h-8)).toFixed(1)).join(' ');
  const last=pts.split(' ').pop();
  return '<svg class="spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" role="img" aria-label="trend"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+last.split(',')[0]+'" cy="'+last.split(',')[1]+'" r="3" fill="'+color+'"/></svg>';
}
function arcPath(cx,cy,r,a0,a1){
  const p=a=>[cx+r*Math.cos(a),cy+r*Math.sin(a)];
  const[x0,y0]=p(a0),[x1,y1]=p(a1);
  return 'M '+x0.toFixed(2)+' '+y0.toFixed(2)+' A '+r+' '+r+' 0 '+((a1-a0)>Math.PI?1:0)+' 1 '+x1.toFixed(2)+' '+y1.toFixed(2);
}
function threadRing(ts,size,thick,center){
  const cx=size/2,cy=size/2,r=(size-thick)/2;let segs='';
  if(!ts.length){segs='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="rgba(28,23,18,.18)" stroke-width="'+thick+'"/>';}
  else{const n=ts.length,gap=n===1?0.001:0.42,span=(Math.PI*2-gap*n)/n;let a=-Math.PI/2;
    ts.forEach(t=>{segs+='<path d="'+arcPath(cx,cy,r,a,a+span)+'" fill="none" stroke="'+CATS[t.cat].c+'" stroke-width="'+thick+'" stroke-linecap="round"/>';a+=span+gap;});}
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" aria-label="'+ts.length+' active threads">'+segs+
    '<text x="'+cx+'" y="'+(cy+1)+'" text-anchor="middle" dominant-baseline="middle" font-family="Instrument Sans" font-weight="700" font-size="'+(size*0.3)+'" fill="'+(center||'#1C1712')+'">'+ts.length+'</text></svg>';
}
function timeToSlot(t){const[h,m]=t.split(':').map(Number);let mins=(h*60+m)-450;if(mins<0)mins+=1440;return Math.max(0,Math.min(23,Math.floor(mins/30)));}
function slotTime(i){const m=450+i*30;const h=Math.floor(m/60)%24;const mm=m%60;return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');}
function pulseStrip(p){
  const slots=new Array(24).fill(null);
  (p.obsHrs||[]).forEach(h=>{slots[Math.min(23,h*2)]={c:'#5C7CF0',t:'Obs taken'};});
  S.threads.filter(t=>t.p===p.id).forEach(t=>{slots[timeToSlot(t.time)]={c:CATS[t.cat].c,t:'Thread created · '+CATS[t.cat].label,tm:t.time};});
  return '<div class="pulse" role="group" aria-label="Shift pulse: observations and thread events across 12 hours">'+
    slots.map((sl,i)=>{
      if(!sl) return '<i></i>';
      const tip=(sl.tm||slotTime(i))+' · '+sl.t;
      return '<button type="button" style="background-color:'+sl.c+';" data-tip="'+tip+'" aria-label="'+tip+'" onclick="event.stopPropagation()"></button>';
    }).join('')+'</div>';
}

/* ================= WARD ================= */
function acuity(p){
  const ts=threadsFor(p.id);
  return (ts.some(t=>t.cat==='concern')?10:0)+p.news*3+ts.length;
}
function rWard(){
  const isNight=S.phase==='night';
  const list=[...S.patients].sort((a,b)=>acuity(b)-acuity(a));
  const banners=[];
  if(isNight&&S.eileenFlag)
    banners.push('<div class="banner warn" role="alert">'+ico('flag')+'1 Thread on Eileen Foster (Bed 3) was not acknowledged at handover. Flagged to the nurse in charge at '+S.flagTime+'.<button class="btn ghost" onclick="go(\'patient\',{p:\'eileen\'})">Review</button></div>');
  const rem=S.threads.filter(t=>t.remind&&['acknowledged','live'].includes(t.status));
  if(isNight&&rem.length)
    banners.push('<div class="banner info">'+ico('alarm')+rem.map(t=>'<b>'+t.remind+'</b> · '+esc(S.patients.find(x=>x.id===t.p).name.split(' ')[0])+': '+esc(t.msg.slice(0,42))+(t.msg.length>42?'…':'')).join(' &nbsp;·&nbsp; ')+'</div>');
  if(isNight&&!S.obsEventDone&&S.visitedAlisha)banners.push(obsEventCard());
  if(isNight&&S.tomThreadDone&&S.obsEventDone&&!S.endQueueDone)
    banners.push('<div class="banner info">'+ico('schedule')+'06:45 · Shift end approaching. Tap End shift in the floating bar to decide your Threads.</div>');
  return `
    ${banners.join('')}
    <div class="section-label">${isNight?'First round · concerns first':'My patients · by acuity'}
      <span class="viewtog">${viewToggle()}</span></div>
    <div class="pgrid ${S.view}">${list.map(p=>patientCard(p)).join('')}</div>`;
}
function viewToggle(){
  return `<button class="iconbtn" style="width:36px;height:36px;" aria-label="Grid view" onclick="setView('grid')" ${S.view==='grid'?'disabled title="Grid view is active"':''}><span class="ms" style="font-size:17px;">grid_view</span></button>
  <button class="iconbtn" style="width:36px;height:36px;" aria-label="List view" onclick="setView('list')" ${S.view==='list'?'disabled title="List view is active"':''}><span class="ms" style="font-size:17px;">view_agenda</span></button>`;
}
function patientCard(p){
  const ts=threadsFor(p.id);
  const flags=[];
  if(S.eileenFlag&&p.id==='eileen')flags.push('<span class="pflag">'+ico('flag')+'unack</span>');
  if(p.discharge)flags.push('<span class="pflag">'+ico('logout')+'discharge</span>');
  if(ts.some(t=>t.remind))flags.push('<span class="pflag">'+ico('alarm')+'reminder</span>');
  return `
  <button class="pcard" onclick="go('patient',{p:'${p.id}'})"
    aria-label="Open ${esc(p.name)}, bed ${p.bed}, NEWS ${p.news}, ${ts.length} active threads">
    <span class="top">
      <span class="avatar" aria-hidden="true">${initials(p.name)}</span>
      <span style="min-width:0;"><span class="pname">${esc(p.name)}</span><span class="pdx">${esc(p.dx)}</span></span>
      <span class="bedanchor"><span class="b">BED</span><span class="n">${p.bed}</span></span>
    </span>
    <span class="mid">
      <span class="newsmini">
        <span><span class="nk">NEWS</span><span class="nv" style="color:${p.news>=3?'#7A1F10':(p.news>=1?'#6B4E08':'#2E4A20')};">${p.news}</span></span>
        ${sparkBars(p.newsHist,'rgba(28,23,18,.75)',5)}
      </span>
      <span class="ringwrap">${threadRing(ts,54,7)}<span class="rk">THREADS</span></span>

}

function vitals(p){
  const rrAlert=p.vit.rr.v>=21;
  const cells=[
    {k:'RESP',ic:'air',v:p.vit.rr.v,u:p.vit.rr.u,spark:sparkLine(p.vit.rr.hist,rrAlert?'#E0956A':'#5C7CF0',26),alert:rrAlert,tip:'Respiratory rate, breaths per minute. Line is the 12h trend. Elevated at 21 and above.'},
    {k:'HEART',ic:'cardiology',v:p.vit.hr.v,u:p.vit.hr.u,spark:sparkLine(p.vit.hr.hist,'#5C7CF0',120),tip:'Heart rate in beats per minute. Line is the 12h trend.'},
    {k:'TEMP',ic:'device_thermostat',v:p.vit.temp.v,u:p.vit.temp.u,tip:'Core temperature in degrees Celsius, last check.'},
    {k:'SPO2',ic:'spo2',v:p.vit.spo2.v,u:p.vit.spo2.u,tip:'Oxygen saturation on room air, last check.'},
    {k:'NEWS',ic:'monitoring',v:p.news,u:'',spark:sparkBars(p.newsHist,newsHeat(p.news),5,96,24),tip:'National Early Warning Score. 0 is low risk, 5 and above is critical. Bars show 12h.'},
  ];
  let html=cells.map(c=>`
    <div class="vtile${c.alert?' alert':''}" data-tip="${c.tip}" tabindex="0">
      <span style="display:flex;justify-content:space-between;align-items:center;"><span class="lbl">${ico(c.ic)} ${c.k}</span>${c.alert?ico('trending_up'):''}</span>
      <span class="num">${c.v}<span class="unit">${c.u}</span></span>
      ${c.spark||''}
    </div>`).join('');
  if(p.fluid){
    const tot=p.fluid.inn+p.fluid.out,inPct=(p.fluid.inn/tot*100).toFixed(0);
    html+=`<div class="vtile" data-tip="24-hour fluid balance: intake versus output, in millilitres." tabindex="0"><span class="lbl">${ico('water_drop')} FLUID 24H</span>
      <span class="num" style="font-size:19px;color:#5C7CF0;">+${p.fluid.inn-p.fluid.out}<span class="unit">ml</span></span>
      <div><div class="fluid" role="img" aria-label="Fluid in ${p.fluid.inn}, out ${p.fluid.out} millilitres"><div class="in" style="width:${inPct}%"></div><div class="out" style="flex:1"></div></div>
      <div class="fluidkey"><span>IN ${p.fluid.inn}</span><span>OUT ${p.fluid.out}</span></div></div></div>`;
  }
  return html;
}
function obsEventCard(){
  return `<div class="eventcard" role="alert">
    <h3>${ico('notifications_active')} 03:15 · Obs update · Alisha Mensah (Bed 4)</h3>
    <p>Respiratory rate 14 → 21. NEWS 0 → 2. Marginal on its own. Against Priya's Thread, it reads as a trend.</p>
    <div class="btnrow">
      <button class="btn" onclick="obsDecide(true)">${ico('call')}Escalate to on-call doctor now</button>
      <button class="btn ghost" onclick="obsDecide(false)">Watch and wait</button>
    </div></div>`;
}
function obsDecide(escalate){
  S.obsEventDone=true;S.obsEscalated=true;S.clock=escalate?'03:20':'05:45';
  const a=S.patients.find(x=>x.id==='alisha');
  a.news=2;a.newsHist=[...a.newsHist.slice(2),1,2];a.vit.rr.v=21;a.vit.rr.hist=[...a.vit.rr.hist.slice(2),18,21];
  toast(escalate?'On-call doctor reviewing Alisha. Priya\u2019s read gave the trend four hours of head start.'
               :'Noted. At 05:40 the RR reaches 24 and the doctor is called anyway. The Thread was the earlier signal.');
  if(!S.tomThreadDone)setStep(4);
  render();
}

/* ================= THREAD CARD (full color, text paramount) ================= */
function authorAv(name){
  const i=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  return '<span class="avatar sm" style="background:'+c+';color:var(--ink);" aria-hidden="true">'+i+'</span>';
}
function tcard(t,mode){
  const mine=(S.user==='priya'&&t.author.startsWith('Priya')&&t.status==='live'&&S.phase==='day');
  const inherited=(S.phase==='night'&&t.status==='acknowledged');
  const dark=(t.cat==='priority'||t.cat==='context');
  return `
  <div class="tcard ${t.cat} ${mode||''}" id="card-${t.id}">
    <div class="thead">${ico(CATS[t.cat].ico)}${CATS[t.cat].label}
      <span class="right">${t.status==='live'?'<span class="livedot"></span>LIVE':t.status.toUpperCase()}${inherited?' · DAY':''}${t.remind?' · '+ico('alarm')+t.remind:''}</span>
    </div>
    <div class="tmsg">${esc(t.msg)}</div>
    ${t.img?'<img class="timg" src="'+t.img+'" alt="Photo attached to thread" loading="lazy" onerror="this.remove()">':''}
    <div class="tfoot">
      ${authorAv(t.author)}${esc(t.author)} · ${t.time}
      <button class="detbtn" aria-expanded="false" onclick="event.stopPropagation();togDet('${t.id}',this)">${ico('unfold_more')}Details</button>
    </div>
    <div class="tdetails" id="det-${t.id}">
      <div class="drow"><span>Status</span><span>${t.status}${t.renewals?' · renewed ×'+t.renewals:''}</span></div>
      ${t.ack?'<div class="drow"><span>Received</span><span>'+esc(t.ack.by)+' · '+t.ack.time+'</span></div>':''}
      ${t.remind?'<div class="drow"><span>Reminder</span><span>'+t.remind+' tonight</span></div>':''}
      ${t.esc?'<div class="drow"><span>Record</span><span>'+t.esc+'</span></div>':''}
      <div class="drow"><span>Rule</span><span>${mine?'Editable until handover begins':'Immutable after relay · exits by decision at shift end'}</span></div>
      ${mine?`<div class="dact">
        <button class="btn" onclick="event.stopPropagation();editThread('${t.id}')">${ico('edit')}Edit</button>
        <button class="btn" onclick="event.stopPropagation();withdrawThread('${t.id}')">${ico('undo')}Withdraw</button></div>`
      :(['live','acknowledged'].includes(t.status)?`<div class="dact">
        <button class="btn" onclick="event.stopPropagation();resolveNow('${t.id}')">${ico('check')}Resolve now · concern passed</button></div>`:'')}
    </div>
  </div>`;
}
function togDet(id,btn){
  const d=el('det-'+id);const open=!d.classList.contains('open');
  d.classList.toggle('open',open);btn.setAttribute('aria-expanded',open);
}
function editThread(id){const t=S.threads.find(x=>x.id===id);S.editTarget=id;S.patientOpen=t.p;go('create');}
function withdrawThread(id){S.threads.find(x=>x.id===id).status='resolved';toast('Thread withdrawn. Nothing was relayed, so nothing needs a decision.');render();}
function reviewOldest(pid){
  const t=threadsFor(pid).sort((a,b)=>a.time.localeCompare(b.time))[0];
  openModal(`<h3 id="modalTitle">Review the oldest Thread</h3>
    <p>Created at ${t.time} by ${esc(t.author)}. If it still matters, keep it. If it has passed, resolve it to make room.</p>
    <div class="tgrid list">${tcard(t)}</div>
    <div class="btnrow" style="margin-top:15px;">
      <button class="btn" onclick="resolveFromCap('${t.id}','${pid}')">Resolve · then add new</button>
      <button class="btn quiet" onclick="resolveOnly('${t.id}')">Resolve · nothing new</button>
      <button class="btn ghost" onclick="closeModal()">Keep it</button>
    </div>`);
}
function resolveOnly(id){
  S.threads.find(x=>x.id===id).status='resolved';
  closeModal();toast('Resolved. No new Thread created.');render();
}
function resolveNow(id){
  const t=S.threads.find(x=>x.id===id);t.status='resolved';t.decided=true;
  toast('Resolved early. Gone from the active set.');render();
}
function resolveFromCap(id,pid){
  S.threads.find(x=>x.id===id).status='resolved';
  closeModal();toast('Resolved. Room made deliberately, never silently.');
  S.patientOpen=pid;go('create');
}

/* ================= COMPOSE (linear: write → categorise → set live) ================= */
let composeCat=null;
function rCreate(){

    <span><span class="pname" style="font-size:18px;">${editing?'Edit Thread':'New Thread'} · ${esc(p.name)}</span>
    <span class="pdx" style="display:block;">Three steps: write it, name it, set it live.</span></span>

        aria-describedby="charlabel">${editing?esc(editing.msg):''}</textarea>
      <button class="btn royal" style="min-width:58px;" onclick="speak()" aria-label="Dictate your read, simulated">${ico('mic')}</button>
    </div>
    <div style="height:7px;border-radius:99px;background:var(--card2);overflow:hidden;margin:11px 0 6px;"><div id="charfill" style="height:100%;width:0%;background:var(--cobalt);transition:width .1s;"></div></div>
    <div class="pagesub" id="charlabel" style="margin:0;">0 of 140. The limit forces a read and forbids a note.</div>
    <div class="banner warn" id="lint" role="alert" style="display:none;margin:12px 0 0;">
      ${ico('science')} That looks like a clinical value. Numbers belong in the record, where they trend and audit.
      <button class="btn quiet" style="margin-left:auto;" onclick="lintToRecord()">Put it in the record</button>

    <div style="display:grid;gap:9px;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));" role="group" aria-label="Thread category">
      ${Object.keys(CATS).map(k=>`
        <button id="cat-${k}" aria-pressed="false" onclick="pickCat('${k}')"
          style="border:1.5px solid var(--line);background:var(--card2);border-radius:14px;padding:12px 14px;font-weight:700;font-size:13px;min-height:56px;text-align:left;display:flex;align-items:center;gap:11px;">
          <span class="tdot ${k}" style="width:16px;height:16px;border-radius:5px;flex-shrink:0;"></span>
          <span>${CATS[k].label}<span style="display:block;font-weight:600;color:var(--mut);font-size:11px;margin-top:1px;">${CATS[k].hint}</span></span>
        </button>`).join('')}

}
function cancelCompose(){S.editTarget=null;go('patient',{p:S.patientOpen});}
function wireCompose(){const ta=el('msg');ta.addEventListener('input',composeCheck);composeCheck();if(composeCat)pickCat(composeCat,true);ta.focus();}
function composeCheck(){
  const ta=el('msg');const n=ta.value.length;
  el('charfill').style.width=Math.min(100,n/140*100)+'%';
  el('charfill').style.background=n>=140?'var(--redg)':(n>110?'var(--amber)':'var(--cobalt)');
  el('charlabel').textContent=n+' of 140. '+(n>=140?'Full. More than this is two thoughts, or a record entry.':'The limit forces a read and forbids a note.');
  const clinical=/\b\d+(\.\d+)?\s?(mmol|mg|mcg|kpa|bpm|mmhg|°)|\b(k|na|crp|hb|creat|glucose)\s?[:=]?\s?\d/i.test(ta.value);
  el('lint').style.display=(clinical&&!S.lintDismissed)?'flex':'none';
  validateCompose();
}
function pickCat(c){composeCat=c;Object.keys(CATS).forEach(k=>{const b=el('cat-'+k);const on=k===c;b.setAttribute('aria-pressed',on);b.style.borderColor=on?CATS[k].c:'var(--line)';b.style.background=on?'var(--card)':'var(--card2)';});validateCompose();}
function validateCompose(){
  const okMsg=el('msg').value.trim().length>=4,okCat=!!composeCat;
  el('setlive').disabled=!(okMsg&&okCat);
  el('why').innerHTML=(okMsg&&okCat)?'':(ico('info')+'<span>Set live is off: '+(!okMsg?'write at least a short sentence in step 1':'')+((!okMsg&&!okCat)?', and ':'')+(!okCat?'pick one category in step 2':'')+'.</span>');
}
function speak(){
  const ta=el('msg');
  const sample=(S.patientOpen==='alisha'&&S.user==='priya')?'Quieter than yesterday. Keep an eye overnight.'
    :(S.patientOpen==='margaret'?'Wakes distressed around 4am. A quiet word settles her faster than anything.'
    :'Family asking the same questions each visit. Keep answers consistent.');
  ta.value=sample;
  if(S.patientOpen==='alisha'&&S.user==='priya')pickCat('comparison');
  if(S.patientOpen==='margaret'&&S.user==='tom')pickCat('pattern');
  composeCheck();toast('Transcribed verbatim. The AI never rewords a read.');
}
function lintToRecord(){
  openModal(`<h3 id="modalTitle">Straight to the record</h3>
    <p>Clinical values are factual continuity. They belong in the EPR, where they trend, alert, and persist.</p>
    <div class="epr"><b>EPR quick entry · attributed to ${S.user==='tom'?'Tom R, RN':'Priya K, RN'}</b><br>${esc(el('msg')?el('msg').value:'')}</div>
    <div class="btnrow"><button class="btn" onclick="closeModal();cancelCompose();toast('Filed to the record. No Thread created.')">File to record</button>
    <button class="btn ghost" onclick="closeModal()">Back</button></div>`);
}
function lintDismiss(){S.lintDismissed=true;el('lint').style.display='none';toast('Kept as a Thread. You outrank the lint.');}
function setLive(){
  const msg=el('msg').value.trim();
  if(S.editTarget){
    const t=S.threads.find(x=>x.id===S.editTarget);t.msg=msg;t.cat=composeCat;S.editTarget=null;
    toast('Thread updated. Still yours until handover begins.');
  }else{
    S.threads.push({id:uid(),p:S.patientOpen,cat:composeCat,msg,author:S.user==='tom'?'Tom R, RN':'Priya K, RN',
      time:S.phase==='day'?'18:42':'23:05',status:'live',renewals:0,ack:null,esc:null});
    if(S.user==='priya'){S.clock='18:42';toast('Thread live in 12 seconds. It travels at the 19:30 handover.');if(S.step===1)setStep(2);}
    else{S.tomThreadDone=true;S.clock='23:05';toast('Thread live. The next handover carries your read forward.');if(S.obsEventDone)setStep(4);}

}

/* ================= HANDOVER · FOCUS STACK ================= */
function startHo(){
  S.fabHo=false;S.hoStarted=true;S.hoIndex=0;S.hoT=0;S.clock='19:30';
  S.threads.forEach(t=>{if(t.status==='live')t.status='relayed';});
  go('handover');
}
function hoThreads(p){return S.threads.filter(t=>t.p===p.id&&['relayed','acknowledged'].includes(t.status));}
function rHo(){
  const p=S.patients[S.hoIndex];const ts=hoThreads(p);
  const pend=ts.filter(t=>t.status==='relayed');
  const dots=S.patients.map((_,i)=>'<span class="'+(i<S.hoIndex?'done':(i===S.hoIndex?'now':''))+'"></span>').join('');
  const facts=`<details class="tilebox" style="margin:0 0 12px;padding:12px 16px;">
    <summary class="lbl" style="cursor:pointer;list-style:none;">${ico('smart_toy')} FACTS · AMBIENT AI<span class="ms chev" aria-hidden="true">expand_more</span></summary>
    <ul style="list-style:none;margin-top:10px;">${p.ai.map(l=>'<li style="font-weight:600;font-size:13px;padding:4px 0 4px 24px;position:relative;"><span class="ms" style="position:absolute;left:0;top:5px;font-size:14px;color:var(--cobalt-soft);">check</span>'+esc(l)+'</li>').join('')}</ul>
  </details>`;
  return `
  <div style="max-width:900px;margin:0 auto;">
  <div class="ho-progress" aria-label="Handover progress, patient ${S.hoIndex+1} of 5">${dots}</div>
  <div class="hp-strip">
    <span class="avatar">${initials(p.name)}</span>
    <span style="min-width:0;"><span class="pname" style="font-size:16px;">${esc(p.name)}</span>
    <span class="pdx" style="font-size:11px;">${esc(p.dx)}</span></span>
    <span style="margin-left:auto;display:flex;align-items:center;gap:12px;">
      <span style="font-weight:700;font-size:13px;">NEWS ${p.news}</span>
      <span class="bedanchor" style="padding:6px 10px 5px;"><span class="b">BED</span><span class="n" style="font-size:17px;">${p.bed}</span></span>
    </span>
  </div>
  ${facts}
  ${ts.length
    ? `<div class="tgrid list">${ts.map(t=>hoCard(t)).join('')}</div>`
    : `<div class="tilebox" style="text-align:center;color:var(--mut);font-weight:600;">No Threads for ${esc(p.name.split(' ')[0])}. The facts are the whole story today.</div>`}
  <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">
    ${S.hoIndex>0?'<button class="btn ghost" onclick="S.hoIndex--;render()">'+ico('arrow_back')+'Back</button>':''}
    ${pend.length
      ? `<button class="btn big" style="flex:2;min-width:220px;" onclick="ackAll('${p.id}')">${ico('done_all')}Acknowledge all ${pend.length} · next patient</button>
         <button class="btn ghost" style="flex:1;" onclick="hoNext()">Skip · leaves ${pend.length} unacknowledged</button>`
      : `<button class="btn big" style="flex:1;" onclick="hoNext()">${S.hoIndex<4?'Next patient':'Finish handover'}${ico('arrow_forward')}</button>`}
  </div>
  <div class="legend">
    <span>${ico('done_all')} Acknowledge means received, never agreed. One tap covers the patient.</span>
    <span>${ico('replay')} Renew, at shift end, keeps a Thread watching for one more shift, three at most.</span>
    <span>${ico('upload_file')} Record, at shift end, files it permanently into the EPR with both names.</span>

}
function hoCard(t){
  const acked=t.status==='acknowledged';
  return `
  <div class="tcard ${t.cat}" style="min-height:0;">
    <div class="hocard">
      <div class="hleft">
        <div class="thead">${ico(CATS[t.cat].ico)}${CATS[t.cat].label}
          <span class="right">${esc(t.author.split(',')[0])} · ${t.time}${t.renewals?' · ×'+t.renewals:''}${t.remind?' · '+ico('alarm')+t.remind:''}</span></div>
        <div class="tmsg" style="font-size:17px;">${esc(t.msg)}</div>
        ${t.img?'<img class="timg" src="'+t.img+'" alt="Photo attached to thread" loading="lazy" onerror="this.remove()">':''}
      </div>
      <div class="hacts">
        ${acked
          ? '<span class="btn onink" style="min-height:44px;cursor:default;">'+ico('check_circle')+'Received</span>'
          : '<button class="btn onink" onclick="ackOne(\''+t.id+'\')">'+ico('done_all')+'Acknowledge</button>'}
        <button class="btn onink" onclick="addReminder('${t.id}')" aria-label="Add reminder for this thread">${ico('alarm_add')}${t.remind?t.remind:'Remind'}</button>
      </div>
    </div>
  </div>`;
}
function ackOne(id){
  const t=S.threads.find(x=>x.id===id);

  render();
}
function ackAll(pid){
  hoThreads({id:pid}).forEach(t=>{if(t.status==='relayed'){t.status='acknowledged';t.ackm=(32+S.hoIndex*2);t.ack={by:'Tom R, RN',time:'19:'+t.ackm};}});
  if(S.hoIndex<4){S.hoIndex++;toast('Acknowledged. Next patient.');}
  render();
}
function addReminder(id){
  const t=S.threads.find(x=>x.id===id);
  openModal(`<h3 id="modalTitle">Remind Tom tonight</h3>
    <p>A quiet, local nudge on the night board. It never pages and never leaves the ward tablet.</p>
    <div class="btnrow">
      ${['22:00','00:00','02:00','04:00'].map(tt=>'<button class="btn quiet" onclick="setRem(\''+id+'\',\''+tt+'\')">'+tt+'</button>').join('')}
    </div>
    <div class="btnrow" style="margin-top:10px;"><button class="btn ghost" onclick="closeModal()">Cancel</button></div>`);
}
function setRem(id,tt){
  S.threads.find(x=>x.id===id).remind=tt;

}
function hoNext(){
  if(S.hoIndex<4){S.hoIndex++;S.hoT=0;render();return;}
  const unacked=S.threads.filter(t=>t.status==='relayed');

    openModal(`<h3 id="modalTitle">${unacked.length} Thread${unacked.length>1?'s':''} not acknowledged</h3>

function endCard(t){
  const p=S.patients.find(x=>x.id===t.p);const capReached=t.renewals>=3;
  const hints=[];
  if(t.p==='alisha'&&S.obsEscalated)hints.push(ico('stethoscope')+' Under doctor review since 03:20: Record is its natural exit.');
  if(p.discharge)hints.push(ico('logout')+' Discharge planned: file into the transfer letter, or resolve.');
  if(capReached)hints.push(ico('block')+' Renew is off: renewed three times already. A concern that crosses four shifts has either passed or belongs in the record.');
  return `
  <div class="tcard ${t.cat}">
    <div class="thead">${ico(CATS[t.cat].ico)}${CATS[t.cat].label}
      <span class="right">${t.time}${t.renewals?' · ×'+t.renewals:''}${t.remind?' · '+ico('alarm')+t.remind:''}</span></div>
    <div class="tmsg">${esc(t.msg)}</div>
    ${hints.length?'<div class="tdetails open">'+hints.join('<br>')+'</div>':''}
    <div class="decide">
      <button class="btn onink" onclick="decide('${t.id}','resolve')">${ico('check')}Resolve</button>
      <button class="btn onink" onclick="decide('${t.id}','renew')" ${capReached?'disabled':''} title="${capReached?'Renewal cap of three reached: resolve or file to record instead':'Keep watching for one more shift'}">${ico('replay')}Renew</button>
      <button class="btn onink" onclick="decide('${t.id}','escalate')">${ico('upload_file')}${p.discharge?'Transfer':'Record'}</button>
    </div>
  </div>`;
}
function decide(id,action){
  const t=S.threads.find(x=>x.id===id);const p=S.patients.find(x=>x.id===t.p);
  if(action==='resolve'){t.status='resolved';t.decided=true;toast('Resolved. Purged from the active set, gone entirely after 72 hours.');render();checkEnd();}
  if(action==='renew'){t.renewals++;t.status='live';t.decided=true;toast('Renewed ×'+t.renewals+'. It re-enters the 07:30 handover as live.');render();checkEnd();}
  if(action==='escalate'){
    openModal(`<h3 id="modalTitle">Escalate into the ${p.discharge?'transfer letter':'record'}</h3>
      <p>The Thread closes and points to its permanent successor. Both names travel.</p>
      <div class="epr"><b>EPR entry · pre-filled, complete before filing</b><br><br>
      <b>Patient:</b> ${esc(p.name)} · Bed ${p.bed}<br>
      <b>Nursing observation (verbatim Thread):</b> ${esc(t.msg)}<br>
      <b>Originating author:</b> ${esc(t.author)} · ${t.time}<br>
      <b>Escalated by:</b> Tom R, RN · 07:0${(idc%9)+1}<br>
      <b>Clinical context:</b> <span style="opacity:.6;">[nurse completes: events, actions, plan]</span></div>

        <button class="btn royal" onclick="fileEsc('${t.id}')">${ico('upload_file')}File</button>
        <button class="btn ghost" onclick="closeModal()">Back</button>
      </div>`);
  }
}
function fileEsc(id){
  const t=S.threads.find(x=>x.id===id);
  t.status='escalated';t.decided=true;t.esc='EPR-2026-7B-0'+(++idc);
  closeModal();toast('Filed. Thread closed with a link to its successor: '+t.esc);
  render();checkEnd();
}
function checkEnd(){
  const pending=S.threads.filter(t=>['acknowledged','live'].includes(t.status)&&!t.decided);
